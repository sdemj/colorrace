<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLOR RACE: Neon Asphalt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root{--neon:#ff6b00;--asphalt:#090d16;--err:#ef4444}
     html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow-x: hidden; /* 가로 스크롤 방지 */
}
.game-container {
    width: 95vw;
    max-width: 1280px;
    height: 85vh;
    border: 4px solid #ff6b00;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    
    /* 배경 설정 추가 */
    background-image: url('car.png'); /* 기본 경로 */
    background-size: cover;          /* 화면을 꽉 채움 */
    background-position: center;     /* 중앙 정렬 */
    background-repeat: no-repeat;
    background-color: #090d16;       /* 이미지가 안 나올 때를 대비한 기본색 */
    
    margin: 0 auto;
}

@media (max-width: 768px) {
    .round-disp { font-size: 2rem !important; }
    .modal-time { font-size: 2.5rem !important; }
    .menu-btn { width: 180px !important; font-size: 0.9rem !important; }
    .grid-table { gap: 4px !important; }
    .cell { font-size: 1.2rem !important; }
}
        .menu-buttons {
            display: flex;
            justify-content: center; /* 가로 중앙 정렬 */
            gap: 30px;               /* 두 버튼 사이 간격 */
            padding: 20px;
            width: 100%;
            margin-top: auto;      
        }

        .menu-btn {
            width: 250px;            /* 좌우 크기 조정 */
            padding: 14px 0;
            background: #05070c;     /* 이미지와 유사한 어두운 배경색 */
            color: #f1f5f9;          /* 글자색 (밝은 회색/흰색) */
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            border: 2px solid #ff6b00; /* 네온 오렌지 테두리 */
            border-radius: 0;        /* 기본 둥근 모서리 제거 */
            
            /* 핵심: 비스듬한 모서리 만들기 (왼쪽 위/오른쪽 아래 절단 효과) */
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.2); /* 은은한 광채 */
        }

        .menu-btn:hover {
            background: #ff6b00;
            color: #000;
            transform: translateY(-5px) scale(1.05); /* 마우스 호버 시 튀어나오는 효과 */
            box-shadow: 0 0 30px rgba(255, 107, 0, 0.6);
        }
        /* 기존 게임 스타일들 */
        .grid-table{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:12px;background:#111827;border:10px solid #05070c;border-radius:20px;width:100%;max-width:800px;aspect-ratio:16/9;position:relative}
        .cell{position:relative;display:flex;justify-content:center;align-items:center;color:#fff;font-weight:900;font-size:2rem;text-shadow:0 2px 5px rgba(0,0,0,.6);}
        .overlay{position:absolute;inset:0;background:radial-gradient(circle,#374151 0%,#111827 100%);z-index:5;transition:opacity .4s ease;}
        .overlay.revealed{opacity:0;pointer-events:none;}
        .modal-wrap {
          position: fixed;
          inset: 0;                                   /* 상하좌우 0으로 화면 전체 꽉 채움 */
          background: rgba(2, 6, 23, .7);            /* 반투명한 아주 어두운 청색 배경 */
          z-index: 200;                               /* 격자판이나 다른 요소보다 항상 위에 보이도록 설정 */
          display: none;                             /* 기본 상태는 숨김 */
          align-items: center;                       /* 세로 중앙 정렬 */
          justify-content: center;                   /* 가로 중앙 정렬 */
          padding: 16px;
        }
        .modal-wrap.active{display:flex}
        .modal-box {
          background: #111827;                       /* 상자 내부 배경색 (짙은 회색) */
          border: 3px solid var(--neon);             /* 기본 네온 오렌지색 테두리 (#ff6b00) */
          border-radius: 28px;                       /* 둥근 모서리 */
          padding: 36px 48px;                        /* 안쪽 여백 */
          max-width: 520px;                          /* 최대 너비 제한 */
          width: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          text-align: center;
          gap: 12px;
        }
.modal-box {
    width: 90% !important;
    padding: 20px !important;
    border-radius: 20px !important;
}

        /* 3. 팝업창 내부 소요 시간 텍스트 스타일 */
        .modal-time {
          font-family: 'Orbitron', sans-serif;       /* 레트로 감성의 디지털 폰트 */
          font-size: 4rem;                           /* 큼직한 글자 크기 */
          font-weight: 900;
          color: var(--neon);                        /* 기본 네온 오렌지색 */
          white-space: nowrap;
        }
        .mbtn {
          padding: 12px 20px;
          border-radius: 14px;
          font-size: 1rem;
          font-weight: 800;
          cursor: pointer;
          border: 2px solid transparent;
          transition: all .2s;
          display: flex;
          align-items: center;
          gap: 8px;
          white-space: nowrap;
        }
        /* 버튼 마우스 오버 효과 */
        .mbtn:hover {
          filter: brightness(1.12);                  /* 살짝 밝아짐 */
          transform: translateY(-2px);               /* 위로 2px 둥실 떠오름 */
        }

        /* 버튼 개별 색상 설정 */
        .mbtn-exit { background: #334155; color: #cbd5e1; border-color: #475569; } /* 종료하기 (회색) */
        .mbtn-next { background: var(--neon); color: #fff; border-color: #ff8533; }  /* 다음 단계 (오렌지색) */
        .mbtn-retry { background: var(--err); color: #fff; border-color: #f87171; }
        .group-card{border-radius:20px;padding:20px;display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,0.1);border:3px solid rgba(255,255,255,0.2);}
        .group-input{width:100%;text-align:center;padding:10px;border-radius:50px;font-weight:800;background:#fff;color:#334155;border:3px solid #cbd5e1;}
        .btn-cnt{width:50px;height:50px;border-radius:12px;font-size:1.8rem;background:#1e293b;color:#fff;border:2px solid #334155;cursor:pointer;}
        .round-disp{font-family:'Orbitron',sans-serif;color:#fff;font-size:2.8rem;font-weight:900;}
        .action-btn{position:absolute;bottom:16px;right:16px;background:var(--neon);color:#fff;width:54px;height:54px;border-radius:16px;display:none;align-items:center;justify-content:center;cursor:pointer;}
        .action-btn.visible{display:flex;}
        .blink{animation:blink 1.6s infinite;}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
        .page { display: none; }
        .page.active { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%;
            height: 100%;
        }

.img-btn img {
    max-width: 100%;
    width: 150px; /* 모바일에서 조금 더 작게 */
    height: auto;
}

        .img-btn:hover { transform: scale(1.05); /* 마우스 올렸을 때 살짝 커지는 효과 */}
        .learning-goal {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 5px; /* 버튼과의 간격 */
            text-shadow: 0 0 10px rgba(255, 107, 0, 0.5);
            letter-spacing: 1px;
            text-align: center;
        }

        /* 깜빡임 효과 */
        .blink {
            animation: blink 1.6s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .htp-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        #htpBtn img {
            transition: transform 0.3s ease;
        }

        #htpBtn:hover img {
            transform: scale(1.1); /* 마우스를 올리면 10% 커짐 */
        }
        #pg-setup {
            justify-content: flex-start !important;
            /* 배경 이미지가 꽉 차도록 설정 */
            background-size: cover;
            background-position: center;
        }
        #pg-setup > div {
            margin-top: 250px; /* 이미지의 글자 아래로 인터페이스를 밀어냅니다 */
        }
        #pg-welcome {
            justify-content: center !important; /* 내부 요소들을 완벽하게 수직 중앙 정렬 */
            padding-top: 0;
        }
        .grid-table {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            background: #05070c;
            border: 8px solid #05070c;
            border-radius: 20px;
            width: 100%;
            max-width: 950px;
            aspect-ratio: 16 / 9; /* 16:9 비율 유지 */
            position: relative;
        }

        /* 페이지가 활성화되었을 때 중앙 정렬 */
        #pg-game.active {
            display: flex;
            justify-content: center; /* 수직 중앙 */
            align-items: center;     /* 수평 중앙 */
            padding-top: 0;          /* 게임 화면은 중앙 정렬 */
        }

        /* Class Record 표 전용 간결한 스타일 고정 */
        .htable {
            width: 100%;
            border-collapse: collapse;
            color: #cbd5e1;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 8px;
        }
        .htable th {
            padding: 10px;
            background: #1e293b;
            border-bottom: 2px solid #334155;
            font-weight: 700;
        }
        .htable td {
            padding: 12px;
            border-bottom: 1px solid #1f2937;
            font-weight: 800;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div id="pg-welcome" class="page active">
        <div style="flex-grow: 1;"></div> 
        <p class="learning-goal blink" style="margin-bottom: 3px;">
            Color Race 게임을 하며 단어를 빠르고 정확하게 읽어 봅시다.
        </p>

        <div class="menu-buttons">
            <button class="img-btn" onclick="openHTP()">
                <img src="btn1.png" alt="HOW TO PLAY">
            </button>
            <button class="img-btn" onclick="showPage('pg-setup')">
                <img src="btn2.png" alt="팀 설정하기">
            </button>
        </div>
    </div>

    <div id="pg-setup" class="page">
        <div class="w-full flex flex-col items-center gap-4 mt-10"> 
            <div class="flex items-center gap-6 bg-[#090d16]/50 border-2 border-[#ff6b00]/30 p-4 px-8 rounded-2xl"> 
                <span class="text-[#cbd5e1] font-bold text-xl">참가 팀 수</span>
                <button class="btn-cnt" onclick="chgCount(-1)">-</button>
                <span id="countDisp" class="text-[#ff6b00] font-black text-4xl w-16 text-center">6</span>
                <button class="btn-cnt" onclick="chgCount(1)">+</button>
            </div>
            
            <div id="groupGrid" class="grid grid-cols-3 gap-4 w-full max-w-[800px]"></div>
            
            <button onclick="startGame()" class="mt-4 px-12 py-5 bg-[#ff6b00] text-black font-black text-2xl rounded-xl shadow-[0_0_20px_rgba(255,107,0,0.5)] hover:scale-105 transition-all">
                게임 시작하기
            </button>
        </div>
    </div>

    <div id="pg-game" class="page">
        <div class="w-full flex flex-col gap-4 items-center">
            <div class="flex flex-col items-center gap-3 mt-4">
                <div id="roundDisp" class="round-disp text-white text-5xl font-black italic tracking-tighter">ROUND 1</div>
                <!-- 수정: 이전 기록 시인성 강화 배지 -->
                <div id="recDisp" class="text-[#feff00] font-black text-2xl bg-black/70 border-2 border-[#ff6b00] px-6 py-1.5 rounded-xl shadow-[0_0_15px_rgba(255,107,0,0.4)] tracking-wide">이전 기록: 없음</div>
            </div>
            
            <div id="dashboard" class="flex flex-wrap gap-3 justify-center bg-black/40 border border-white/10 p-3 rounded-2xl w-full max-w-[900px]"></div>
            
            <div class="relative w-full flex justify-center">
                <div id="colorGrid" class="grid-table"></div>
                <button id="nextBtn" class="action-btn" onclick="handleNext()">➤</button>
            </div>
            
            <p class="blink text-gray-400 font-bold bg-black/60 px-6 py-2 rounded-full border border-white/10 mt-2">
                스페이스바를 눌러 셀을 하나씩 공개하세요
            </p>
        </div>
    </div>

    <div id="resModal" class="modal-wrap">
      <div id="resBox" class="modal-box">
        <div style="color:#94a3b8;font-weight:700;font-size:1.1rem;letter-spacing:2px;text-transform:uppercase">
          이번 라운드 기록
        </div>
        <div id="resTime" class="modal-time">00.00초</div>
        <div id="resMsg" style="font-size:1.1rem;font-weight:700;color:#cbd5e1"></div>
        <div id="resBtns" style="display:flex;gap:12px;justify-content:center;margin-top:8px"></div>
      </div>
    </div>

    <!-- 수정: 모달 박스 너비 조정 및 버튼 가로 정렬 처리 -->
    <div id="repModal" class="modal-wrap">
      <div class="modal-box" style="border-color:#94a3b8; max-width: 580px; max-height:85vh; overflow-y:auto; gap:16px; padding: 36px 30px;">
        <div style="color:#cbd5e1;font-weight:900;font-size:1.8rem;letter-spacing:2px">Class Record</div>
        <table class="htable">
          <thead><tr><th>라운드</th><th>소요 시간</th></tr></thead>
          <tbody id="repBody"></tbody>
        </table>
        <!-- 가로 배열 유지를 위해 flex-nowrap 및 너비를 압축한 버튼 디자인 구성 -->
        <div style="display:flex; gap:10px; flex-wrap:nowrap; justify-content:center; width:100%;">
          <button class="mbtn mbtn-next" onclick="resetGame()" style="flex:1; justify-content:center; font-size:0.95rem; padding:12px 10px;">초기화 (동일 팀)</button>
          <button class="mbtn mbtn-exit" onclick="goSetup()" style="flex:1; justify-content:center; font-size:0.95rem; padding:12px 10px;">처음으로 (팀 재지정)</button>
        </div>
      </div>
    </div>

    <div id="htpModal" class="modal-wrap">
      <div class="htp-container" style="position:relative;">
        <img src="htp.png" alt="How to Play Guide" style="max-width: 90%; max-height: 90vh; border-radius: 16px;">
        
        <button onclick="closeHTP()" style="position:absolute; top:20px; right:20px; background:none; border:none; cursor:pointer;">
          <img src="x.png" alt="Close" style="width: 50px; height: 50px;">
        </button>
      </div>
    </div>

    <button id="htpBtn" onclick="openHTP()" style="position:fixed; top:14px; right:14px; background:none; border:none; cursor:pointer; z-index:100; display:none;">
        <img src="q.png" alt="HOW TO PLAY" style="width: 60px; height: 60px;">
    </button>
</div>

<script>
const masterColors = [
  {id:'red',    name:'빨강', hex:'#ff4757', text:'#ffffff', def:'팀 이름'}, 
  {id:'blue',   name:'파랑', hex:'#2e86de', text:'#ffffff', def:'팀 이름'}, 
  {id:'yellow', name:'노랑', hex:'#feca57', text:'#ffffff', def:'팀 이름'}, 
  {id:'green',  name:'초록', hex:'#1dd1a1', text:'#ffffff', def:'팀 이름'}, 
  {id:'pink',   name:'분홍', hex:'#ff9ff3', text:'#ffffff', def:'팀 이름'}, 
  {id:'black',  name:'검정', hex:'#576574', text:'#ffffff', def:'팀 이름'}, 
];
const words=['January','February','March','April','May','June','July','August','September','October','November','December'];
const cellCount=16;
let page='welcome',groupCount=6,groupNames={},roundNum=1,revIdx=-1,lastRec=null,history=[],startTime=null,timerOn=false,success=false,pausedMs=0,pauseAt=null,scoreVal=0;
masterColors.forEach(c=>groupNames[c.id]=c.def);

const pages = {
    welcome: 'pg-welcome',
    setup: 'pg-setup',
    game: 'pg-game'
};
const grid=document.getElementById('colorGrid');
const roundDisp=document.getElementById('roundDisp');
const recDisp=document.getElementById('recDisp');
const nextBtn=document.getElementById('nextBtn');
const resModal=document.getElementById('resModal');
const resBox=document.getElementById('resBox');
const resTime=document.getElementById('resTime');
const resMsg=document.getElementById('resMsg');
const resBtns=document.getElementById('resBtns');
const repModal=document.getElementById('repModal');
const repBody=document.getElementById('repBody');
const dashboard=document.getElementById('dashboard');
const htpModal=document.getElementById('htpModal');
const htpBtn=document.getElementById('htpBtn');
const groupGrid=document.getElementById('groupGrid');
const countDisp=document.getElementById('countDisp');

function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById(pageId);
    if(target) target.classList.add('active');
    
    const container = document.querySelector('.game-container');
    
    // 이미지 경로가 확실한지 다시 한 번 확인하세요
    if (pageId === 'pg-welcome') {
        container.style.backgroundImage = "url('car.png')"; 
    } else if (pageId === 'pg-setup') {
        container.style.backgroundImage = "url('bg.png')";  
    } else if (pageId === 'pg-game') {
        container.style.backgroundImage = "url('bg1.png')"; 
    }
    
    const htpBtn = document.getElementById('htpBtn');
    if(htpBtn) htpBtn.style.display = (pageId === 'pg-setup' || pageId === 'pg-game') ? 'block' : 'none';
    page = pageId;
}

function playWelcomeSound(){
  try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return;const c=new A(),now=c.currentTime,notes=[110,147,196,294,220,440],durs=[.08,.08,.08,.12,.1,.4];let t=0;notes.forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type=i===notes.length-1?'sawtooth':'triangle';o.frequency.setValueAtTime(f,now+t);if(i===notes.length-1)o.frequency.exponentialRampToValueAtTime(880,now+t+durs[i]);g.gain.setValueAtTime(.18,now+t);g.gain.exponentialRampToValueAtTime(.01,now+t+durs[i]);o.connect(g);g.connect(c.destination);o.start(now+t);o.stop(now+t+durs[i]);t+=durs[i]-.02});}catch(e){}
}
function playClick(){
  try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return;const c=new A(),o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();o.type='sawtooth';o.frequency.setValueAtTime(50,c.currentTime);o.frequency.exponentialRampToValueAtTime(260,c.currentTime+.12);o.frequency.exponentialRampToValueAtTime(80,c.currentTime+.28);f.type='lowpass';f.frequency.setValueAtTime(300,c.currentTime);f.frequency.exponentialRampToValueAtTime(1000,c.currentTime+.08);f.frequency.exponentialRampToValueAtTime(180,c.currentTime+.28);g.gain.setValueAtTime(.28,c.currentTime);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+.28);o.connect(f);f.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.3);}catch(e){}
}

function goSetup(){
  playWelcomeSound();
  repModal.classList.remove('active');
  resModal.classList.remove('active');
  showPage('pg-setup');
  renderGroups();
}

function chgCount(d){
  const n=groupCount+d;
  if(n>=2&&n<=6){saveNames();groupCount=n;countDisp.textContent=n;renderGroups();}
}
function saveNames(){
  masterColors.slice(0,groupCount).forEach(c=>{
    const el=document.getElementById('inp-'+c.id);
    if(el)groupNames[c.id]=el.value.trim()||c.def;
  });
}
function renderGroups(){
  groupGrid.innerHTML='';
  masterColors.slice(0,groupCount).forEach(c=>{
    const val=groupNames[c.id]||c.def;
    const card=document.createElement('div');
    card.className='group-card';
    card.style.background=`linear-gradient(135deg,${c.hex}ee,${c.hex}99)`;
    card.innerHTML=`<label style="font-weight:900;font-size:1.8rem;margin-bottom:10px;color:${c.text};text-shadow:0 1px 3px rgba(0,0,0,.4)">${c.name}</label><input type="text" id="inp-${c.id}" class="group-input" value="${val}">`;
    const inp=card.querySelector('input');
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});
    groupGrid.appendChild(card);
  });
}

function startGame() {
    saveNames(); 
    showPage('pg-game'); 
    updateDashboard(); 
    initGrid(true); 
}

function updateDashboard() {
    dashboard.innerHTML = '';
    masterColors.slice(0, groupCount).forEach(c => {
        const nm = groupNames[c.id] || c.def;
        const b = document.createElement('div');
        b.style.backgroundColor = c.hex;
        b.style.color = c.text;
        b.style.padding = "6px 16px";
        b.style.borderRadius = "50px";
        b.style.fontWeight = "900";
        b.style.fontSize = "1.1rem";
        b.style.border = "2px solid rgba(255,255,255,0.2)";
        b.innerHTML = `<span>${nm}</span>`;
        dashboard.appendChild(b);
    });
}

function getColors(){
  let res=[],active=masterColors.slice(0,groupCount).map(c=>c.hex);
  const base=Math.floor(cellCount/active.length);
  active.forEach((col,i)=>{const n=i===active.length-1?cellCount-res.length:base;for(let j=0;j<n;j++)res.push(col);});
  for(let i=res.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[res[i],res[j]]=[res[j],res[i]];}
  return res;
}
function getWords(){
  let sel=[],tmp=[...words];
  for(let i=0;i<cellCount;i++){if(!tmp.length)tmp=[...words];sel.push(tmp.splice(Math.floor(Math.random()*tmp.length),1)[0]);}
  return sel;
}
function initGrid(reset=false){
  grid.innerHTML='';revIdx=-1;nextBtn.classList.remove('visible');
  resModal.classList.remove('active');repModal.classList.remove('active');resBox.classList.remove('fail');
  pausedMs=0;pauseAt=null;
  if(reset){roundNum=1;lastRec=null;history=[];roundDisp.textContent='ROUND 1';recDisp.textContent='이전 기록: 없음';}
  startTime=Date.now();timerOn=true;
  const cols=getColors(),wrds=getWords();
  for(let i=0;i<cellCount;i++){
    const cell=document.createElement('div');cell.className='cell';
    cell.style.backgroundColor=cols[i];cell.textContent=wrds[i];
    const ov=document.createElement('div');ov.className='overlay';ov.id='ov-'+i;
    cell.appendChild(ov);grid.appendChild(cell);
  }
}
function fmt(s){
  if(s===null)return'없음';
  if(s>=60){const m=Math.floor(s/60),r=(s%60).toFixed(2);return`${m}분 ${r}초`;}
  return`${s.toFixed(2)}초`;
}
function showResult(dur){
  resTime.textContent=fmt(dur);resBtns.innerHTML='';
  if(lastRec===null||dur<lastRec){
    success=true;history.push({round:roundNum,time:dur});lastRec=dur;
    resMsg.textContent=roundNum===1?'첫 라운드 완료!':'기록 단축 성공! 다음 단계로 도전하세요.';
    resMsg.style.color='#cbd5e1';resBox.classList.remove('fail');
    resBtns.innerHTML=`<button class="mbtn mbtn-exit" onclick="exitGame()">종료하기</button><button class="mbtn mbtn-next" onclick="handleNext()">다음 라운드</button>`;
    nextBtn.classList.add('visible');
  }else{
    success=false;
    resMsg.textContent=`기록 단축 실패... (${fmt(lastRec)}보다 빨라야 함)`;
    resMsg.style.color='var(--err)';resBox.classList.add('fail');
    resBtns.innerHTML=`<button class="mbtn mbtn-exit" onclick="exitGame()">종료하기</button><button class="mbtn mbtn-retry" onclick="handleNext()">다시 시도</button>`;
    nextBtn.classList.remove('visible');
  }
  resModal.classList.add('active');
}
function handleNext(){
  resModal.classList.remove('active');
  if(success){roundNum++;roundDisp.textContent=`ROUND ${roundNum}`;recDisp.textContent=`이전 기록: ${fmt(lastRec)}`;}
  initGrid();
}
function exitGame(){
  resModal.classList.remove('active');
  repBody.innerHTML='';
  if(!history.length){repBody.innerHTML='<tr><td colspan="2" style="color:#64748b;text-align:center;padding:16px">기록이 없습니다.</td></tr>';}
  else{history.forEach(r=>{const tr=document.createElement('tr');tr.innerHTML=`<td>ROUND ${r.round}</td><td style="color:var(--neon)">${fmt(r.time)}</td>`;repBody.appendChild(tr);});}
  repModal.classList.add('active');
}
function resetGame(){repModal.classList.remove('active');initGrid(true);}

function openHTP() {
    document.getElementById('htpModal').classList.add('active');
}

function closeHTP() {
    document.getElementById('htpModal').classList.remove('active');
}

window.addEventListener('keydown', e => {
    if(e.code !== 'Space') return;
    if(document.activeElement && document.activeElement.tagName === 'INPUT') return;
    if(!htpModal.classList.contains('active')) e.preventDefault();
    else return;

    if(page === 'pg-setup') { 
        startGame(); 
        return;
    }
    
    if(page === 'pg-game') { 
        if(resModal.classList.contains('active') || repModal.classList.contains('active')) return;
        if(revIdx < cellCount - 1) {
            revIdx++; 
            playClick();
            const ov = document.getElementById('ov-' + revIdx);
            if(ov) ov.classList.add('revealed');
            
            if(revIdx === cellCount - 1 && timerOn) {
                const end = Date.now();
                let off = pausedMs; 
                if(pauseAt) off += end - pauseAt;
                timerOn = false; 
                showResult((end - startTime - off) / 1000);
            }
        }
    }
});

renderGroups();
</script>
</body>
</html>
